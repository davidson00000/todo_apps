<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>ToDo</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ToDo" />
<meta name="theme-color" content="#fafaf7" />
<style>
  html, body {
    margin: 0; padding: 0; background: #f0eee9;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    color: #1a1820;
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overscroll-behavior-y: none;
  }
  * { box-sizing: border-box; }
  #root { width: 100%; height: 100vh; height: 100dvh; }

  /* gate (no key entered) */
  .gate {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: #f0eee9;
    padding: 24px;
  }
  .gate-card {
    background: #fff; border-radius: 16px;
    padding: 32px; max-width: 400px; width: 100%;
    border: 0.5px solid rgba(20,15,30,0.10);
    box-shadow: 0 4px 24px rgba(20,15,30,0.06);
  }
  .gate h1 {
    margin: 0 0 8px; font-size: 22px; font-weight: 600;
    color: #1a1820;
  }
  .gate p {
    margin: 0 0 20px; font-size: 13px; color: #6b6478; line-height: 1.6;
  }
  .gate input {
    width: 100%; padding: 12px 14px;
    border: 1px solid rgba(20,15,30,0.15); border-radius: 10px;
    font-size: 16px; font-family: inherit;
    background: #fafaf7;
    outline: none;
  }
  .gate input:focus {
    border-color: oklch(0.55 0.18 295);
    background: #fff;
  }
  .gate button {
    margin-top: 12px; width: 100%;
    padding: 12px; border: none; border-radius: 10px;
    background: oklch(0.55 0.18 295); color: #fff;
    font-size: 15px; font-weight: 600; font-family: inherit;
    cursor: pointer;
  }
  .gate-hint {
    margin-top: 14px; font-size: 11px; color: #9b94a8;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=2"></script>
<script src="sync.js?v=2"></script>
<script type="text/babel" src="editor.jsx?v=2"></script>
<script type="text/babel" src="app-real.jsx?v=2"></script>
<script type="text/babel" src="iphone-app.jsx?v=2"></script>

<script type="text/babel" data-presets="react">

function useIsMobile() {
  const [m, setM] = React.useState(() => window.innerWidth <= 820);
  React.useEffect(() => {
    const onR = () => setM(window.innerWidth <= 820);
    window.addEventListener('resize', onR);
    return () => window.removeEventListener('resize', onR);
  }, []);
  return m;
}

function KeyGate() {
  const [val, setVal] = React.useState('');
  const submit = () => {
    if (!val) return;
    const url = new URL(window.location.href);
    url.searchParams.set('key', val);
    window.location.href = url.toString();
  };
  return (
    <div className="gate">
      <div className="gate-card">
        <h1>ToDo</h1>
        <p>続行するにはアクセスキーを入力してください。<br/>Enter your access key to continue.</p>
        <input type="password" value={val} placeholder="key"
          onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter') submit(); }} autoFocus />
        <button onClick={submit}>続行 / Continue</button>
        <div className="gate-hint">URL: ?key=…</div>
      </div>
    </div>
  );
}

function App() {
  const isMobile = useIsMobile();
  if (!window.AppSync.hasKey) return <KeyGate />;
  return isMobile ? <window.MobileApp /> : <window.RealDesktopApp />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
